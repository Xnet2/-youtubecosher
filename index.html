<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MySubs</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
body.light{--bg:#fff;--bg2:#f9f9f9;--bg3:#f1f1f1;--bg4:#e0e0e0;--txt:#0f0f0f;--txt2:#555;--txt3:#888;--border:rgba(0,0,0,.08);--shadow:rgba(0,0,0,.12);--modal-bg:rgba(0,0,0,.7);}
body.dark{--bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#272727;--bg4:#3f3f3f;--txt:#f1f1f1;--txt2:#aaa;--txt3:#717171;--border:rgba(255,255,255,.08);--shadow:rgba(0,0,0,.5);--modal-bg:rgba(0,0,0,.88);}
:root{--red:#ff0000;--red2:#cc0000;--blue:#3ea6ff;--sw:240px;--th:56px;--ease:.2s cubic-bezier(.4,0,.2,1);}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--txt);font-family:'Rubik',sans-serif;min-height:100vh;transition:background .2s,color .2s;}
#topbar{position:fixed;top:0;left:0;right:0;height:var(--th);background:var(--bg);display:flex;align-items:center;padding:0 16px;gap:10px;z-index:200;border-bottom:1px solid var(--border);}
.tbtn{background:none;border:none;cursor:pointer;color:var(--txt);width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background var(--ease);position:relative;}
.tbtn:hover{background:var(--bg3);}
.tbtn svg{width:22px;height:22px;fill:currentColor;}
.badge{position:absolute;top:4px;left:4px;background:var(--red);color:#fff;font-size:9px;font-weight:700;border-radius:8px;min-width:15px;height:15px;display:flex;align-items:center;justify-content:center;padding:0 3px;}
#logo{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.logo-badge{background:var(--red);border-radius:8px;width:34px;height:24px;display:flex;align-items:center;justify-content:center;}
.logo-badge svg{width:15px;height:15px;fill:#fff;}
.logo-txt{font-size:17px;font-weight:700;color:var(--txt);}
.logo-txt span{color:var(--red);}
#search-input{flex:1;max-width:480px;margin:0 auto;background:var(--bg2);border:1.5px solid var(--bg4);border-radius:24px;padding:8px 16px;color:var(--txt);font-size:14px;font-family:'Rubik',sans-serif;outline:none;}
#search-input:focus{border-color:var(--blue);}
.tb-r{display:flex;align-items:center;gap:8px;margin-inline-start:auto;flex-shrink:0;}
.yt-login-btn{background:var(--red);color:#fff;border:none;border-radius:20px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Rubik',sans-serif;}
.yt-login-btn:hover{background:var(--red2);}
.yt-user-chip{display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--bg4);border-radius:20px;padding:3px 10px 3px 3px;cursor:pointer;}
.yt-user-av{width:26px;height:26px;border-radius:50%;object-fit:cover;}
.yt-user-name{font-size:12px;font-weight:500;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
#sidebar{position:fixed;top:var(--th);right:0;width:var(--sw);height:calc(100vh - var(--th));background:var(--bg);overflow-y:auto;padding:12px 0 24px;z-index:100;}
.sb-label{font-size:11px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.8px;padding:8px 20px;}
.chitem{display:flex;align-items:center;gap:10px;height:42px;padding:0 12px;cursor:pointer;border-radius:10px;margin:2px 8px;transition:background var(--ease);}
.chitem:hover,.chitem.active{background:var(--bg3);}
.chdot{width:28px;height:28px;border-radius:50%;overflow:hidden;flex-shrink:0;background:var(--bg3);position:relative;}
.chdot img{width:100%;height:100%;object-fit:cover;}
.chdot .ndot{position:absolute;top:-2px;left:-2px;width:9px;height:9px;border-radius:50%;background:var(--red);border:2px solid var(--bg);display:none;}
.chdot.hn .ndot{display:block;}
.chname{font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
.sb-empty{padding:10px 20px;font-size:12px;color:var(--txt3);line-height:1.6;}
#main{margin-top:var(--th);margin-right:var(--sw);padding:20px 28px;min-height:calc(100vh - var(--th));}
#hero{margin-bottom:28px;display:none;cursor:pointer;border-radius:14px;overflow:hidden;position:relative;aspect-ratio:16/6;background:var(--bg3);}
#hero.show{display:block;}
#hero img{width:100%;height:100%;object-fit:cover;}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,rgba(0,0,0,.85));display:flex;flex-direction:column;justify-content:flex-end;padding:24px;}
.hero-badge{background:var(--red);color:#fff;font-size:10px;font-weight:700;border-radius:4px;padding:3px 8px;width:fit-content;margin-bottom:8px;}
.hero-title{font-size:22px;font-weight:700;color:#fff;margin-bottom:8px;}
.hero-ch{font-size:13px;color:rgba(255,255,255,.8);}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px;}
.card{cursor:pointer;animation:fu .3s both;}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.thumb{position:relative;aspect-ratio:16/9;border-radius:10px;overflow:hidden;background:var(--bg3);margin-bottom:8px;}
.thumb img{width:100%;height:100%;object-fit:cover;}
.new-tag{position:absolute;top:6px;right:6px;background:var(--red);color:#fff;font-size:9px;font-weight:700;border-radius:4px;padding:2px 6px;}
.c-body{display:flex;gap:10px;}
.c-av{width:34px;height:34px;border-radius:50%;overflow:hidden;flex-shrink:0;background:var(--bg3);}
.c-av img{width:100%;height:100%;object-fit:cover;}
.c-title{font-size:13.5px;font-weight:500;line-height:1.35;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.c-ch{font-size:12px;color:var(--txt3);}
.empty{text-align:center;padding:80px 20px;color:var(--txt3);}
.empty h3{color:var(--txt);margin-bottom:8px;font-size:16px;}
.empty button{margin-top:16px;background:var(--red);color:#fff;border:none;border-radius:20px;padding:10px 24px;font-size:13px;cursor:pointer;font-family:'Rubik',sans-serif;font-weight:600;}
#notif-panel,#yt-panel{position:fixed;top:calc(var(--th) + 8px);left:16px;width:340px;background:var(--bg2);border:1px solid var(--bg4);border-radius:12px;box-shadow:0 8px 32px var(--shadow);z-index:300;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;transform:translateY(-8px);max-height:420px;overflow-y:auto;}
#notif-panel.open,#yt-panel.open{opacity:1;pointer-events:all;transform:translateY(0);}
.notif-hdr{padding:14px 16px;border-bottom:1px solid var(--bg3);display:flex;justify-content:space-between;align-items:center;}
.notif-item{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;gap:10px;cursor:pointer;}
.notif-item:hover{background:var(--bg3);}
.notif-av{width:34px;height:34px;border-radius:50%;overflow:hidden;flex-shrink:0;background:var(--bg3);}
.notif-av img{width:100%;height:100%;object-fit:cover;}
.notif-txt{font-size:13px;line-height:1.4;}
.notif-time{font-size:11px;color:var(--txt3);margin-top:3px;}
#yt-panel{padding:18px;}
#yt-panel p{font-size:12px;color:var(--txt3);line-height:1.6;margin-bottom:14px;}
#modal{display:none;position:fixed;inset:0;background:var(--modal-bg);z-index:900;align-items:center;justify-content:center;}
#modal.open{display:flex;}
.modal-box{width:min(900px,92vw);}
.modal-player{position:relative;aspect-ratio:16/9;background:#000;border-radius:10px;overflow:hidden;}
.modal-player iframe{width:100%;height:100%;border:none;}
.modal-info{color:#fff;padding:14px 4px;}
.close-modal{position:absolute;top:-40px;left:0;background:none;border:none;color:#fff;cursor:pointer;font-size:14px;}
.fetch-msg{font-size:13px;color:var(--txt3);padding:20px 0;}
</style>
</head>
<body class="dark">
<div id="topbar">
  <div id="logo"><div class="logo-badge"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div><div class="logo-txt">My<span>Subs</span></div></div>
  <input id="search-input" placeholder="חיפוש בסרטונים ובערוצים שלך...">
  <div class="tb-r">
    <button class="tbtn" onclick="toggleTheme()"><svg viewBox="0 0 24 24"><path d="M12 3a9 9 0 109 9c0-.46-.04-.92-.1-1.36a5.4 5.4 0 01-7.54-7.54A9 9 0 0012 3z"/></svg></button>
    <button class="tbtn" onclick="togglePanel('notif-panel')">
      <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.65 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
      <span id="notif-badge" class="badge" style="display:none"></span>
    </button>
    <div id="auth-area">
      <button class="yt-login-btn" onclick="signIn()">התחבר עם Google</button>
    </div>
  </div>
</div>
<div id="sidebar">
  <div class="sb-label">הערוצים שאני מנוי אליהם</div>
  <div id="ch-list"><div class="sb-empty">התחבר כדי לראות את המנויים שלך</div></div>
</div>
<div id="main">
  <div id="hero"></div>
  <div id="content"><div class="empty"><h3>עדיין לא מחובר</h3><p>התחבר עם חשבון ה-Google/YouTube שלך כדי לראות כאן את כל הסרטונים החדשים מהערוצים שאתה מנוי אליהם.</p><button onclick="signIn()">התחבר עכשיו</button></div></div>
</div>
<div id="notif-panel">
  <div class="notif-hdr"><h3 style="font-size:14px">התראות</h3><button onclick="markAllRead()" style="font-size:12px;color:var(--blue);background:none;border:none;cursor:pointer">סמן הכל כנקרא</button></div>
  <div id="notif-list"></div>
</div>
<div id="modal"><div class="modal-box"><button class="close-modal" onclick="closeModal()">✕ סגור</button><div class="modal-player" id="modal-player"></div><div class="modal-info" id="modal-info"></div></div></div>

<script>
const CLIENT_ID = "426523025549-7c50rkn7cun4vmm2r802u0ij6egjehtg.apps.googleusercontent.com";
const SCOPE = "https://www.googleapis.com/auth/youtube.readonly";
let accessToken = null, tokenClient = null, channels = [], videos = [], me = null;
const lastCheck = +localStorage.getItem('ms_lastcheck') || 0;

document.body.className = localStorage.getItem('ms_theme') || 'dark';
function toggleTheme(){ document.body.className = document.body.className === 'dark' ? 'light' : 'dark'; localStorage.setItem('ms_theme', document.body.className); }
function x(s=''){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function timeAgo(d){ const s=(Date.now()-new Date(d))/1000; if(s<3600) return Math.max(1,Math.round(s/60))+' דק׳'; if(s<86400) return Math.round(s/3600)+' שע׳'; if(s<2592000) return Math.round(s/86400)+' ימים'; return new Date(d).toLocaleDateString('he-IL'); }

window.onload = () => {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID, scope: SCOPE,
    callback: (resp) => { if(resp.error){ toastErr(resp); return; } accessToken = resp.access_token; onSignedIn(); }
  });
};
function signIn(){ if(!tokenClient){ alert('גוגל עדיין נטען, נסה שוב בעוד רגע'); return; } tokenClient.requestAccessToken(); }
function signOut(){ if(accessToken) google.accounts.oauth2.revoke(accessToken, ()=>{}); accessToken=null; me=null; channels=[]; videos=[];
  document.getElementById('auth-area').innerHTML = '<button class="yt-login-btn" onclick="signIn()">התחבר עם Google</button>';
  document.getElementById('ch-list').innerHTML = '<div class="sb-empty">התחבר כדי לראות את המנויים שלך</div>';
  document.getElementById('content').innerHTML = '<div class="empty"><h3>התנתקת</h3><p>התחבר מחדש כדי לראות את הפיד שלך</p><button onclick="signIn()">התחבר</button></div>';
  document.getElementById('hero').classList.remove('show');
}
function toastErr(e){ document.getElementById('content').innerHTML = `<div class="empty"><h3>ההתחברות נכשלה</h3><p>${x(e.error_description||e.error||'שגיאה לא ידועה')}</p><button onclick="signIn()">נסה שוב</button></div>`; }

async function api(url){
  const sep = url.includes('?') ? '&' : '?';
  const r = await fetch(`https://www.googleapis.com/youtube/v3/${url}${sep}access_token=${accessToken}`);
  if(!r.ok){ const e = await r.json().catch(()=>({})); throw new Error(e.error?.message || r.statusText); }
  return r.json();
}

async function onSignedIn(){
  document.getElementById('content').innerHTML = '<div class="fetch-msg">טוען את הפרופיל שלך...</div>';
  try{
    const meData = await api('channels?part=snippet&mine=true');
    me = meData.items?.[0];
    document.getElementById('auth-area').innerHTML = `<div class="yt-user-chip" onclick="signOut()" title="לחץ להתנתקות"><img class="yt-user-av" src="${x(me?.snippet?.thumbnails?.default?.url||'')}"><span class="yt-user-name">${x(me?.snippet?.title||'המשתמש')}</span></div>`;
    await loadSubscriptions();
    await loadFeed();
    renderChannels(); renderFeed(); renderNotifications();
  }catch(e){ document.getElementById('content').innerHTML = `<div class="empty"><h3>שגיאה בטעינת הנתונים</h3><p>${x(e.message)}</p></div>`; }
}

async function loadSubscriptions(){
  channels = []; let pageToken = '';
  do{
    const d = await api(`subscriptions?part=snippet&mine=true&maxResults=50&order=alphabetical${pageToken?'&pageToken='+pageToken:''}`);
    (d.items||[]).forEach(it => channels.push({ id: it.snippet.resourceId.channelId, title: it.snippet.title, thumb: it.snippet.thumbnails?.default?.url }));
    pageToken = d.nextPageToken;
  } while(pageToken && channels.length < 200);
}

async function loadFeed(){
  videos = [];
  document.getElementById('content').innerHTML = `<div class="fetch-msg">טוען סרטונים מ-${channels.length} ערוצים...</div>`;
  const batch = channels.slice(0, 60); // quota-friendly cap
  const chunks = []; for(let i=0;i<batch.length;i+=10) chunks.push(batch.slice(i,i+10));
  for(const chunk of chunks){
    await Promise.all(chunk.map(async ch => {
      try{
        const uploadsId = 'UU' + ch.id.slice(2);
        const d = await api(`playlistItems?part=snippet&maxResults=5&playlistId=${uploadsId}`);
        (d.items||[]).forEach(it => {
          const s = it.snippet;
          if(!s?.resourceId?.videoId) return;
          videos.push({ id: s.resourceId.videoId, title: s.title, thumb: s.thumbnails?.medium?.url || s.thumbnails?.default?.url, chId: ch.id, chTitle: ch.title, chThumb: ch.thumb, publishedAt: s.publishedAt });
        });
      }catch(e){ /* skip channel on error (e.g. no uploads) */ }
    }));
  }
  videos.sort((a,b) => new Date(b.publishedAt) - new Date(a.publishedAt));
}

function renderChannels(){
  const el = document.getElementById('ch-list');
  if(!channels.length){ el.innerHTML = '<div class="sb-empty">לא נמצאו מנויים בחשבון זה</div>'; return; }
  el.innerHTML = channels.map(ch => {
    const hasNew = videos.some(v => v.chId === ch.id && new Date(v.publishedAt) > lastCheck);
    return `<div class="chitem" onclick="filterByChannel('${ch.id}')"><div class="chdot ${hasNew?'hn':''}"><img src="${x(ch.thumb||'')}"><span class="ndot"></span></div><div class="chname">${x(ch.title)}</div></div>`;
  }).join('');
}

let activeChannelFilter = null;
function filterByChannel(id){ activeChannelFilter = activeChannelFilter === id ? null : id; renderFeed(); }

function renderFeed(){
  const list = videos.filter(v => !activeChannelFilter || v.chId === activeChannelFilter);
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  const filtered = q ? list.filter(v => v.title.toLowerCase().includes(q) || v.chTitle.toLowerCase().includes(q)) : list;

  const hero = document.getElementById('hero');
  if(filtered.length){
    const h = filtered[0];
    hero.classList.add('show');
    hero.innerHTML = `<img src="${x(h.thumb)}"><div class="hero-overlay"><div class="hero-badge">חדש בפיד שלך</div><div class="hero-title">${x(h.title)}</div><div class="hero-ch">${x(h.chTitle)} · ${timeAgo(h.publishedAt)}</div></div>`;
    hero.onclick = () => openModal(h);
  } else { hero.classList.remove('show'); }

  const rest = filtered.slice(hero.classList.contains('show') ? 1 : 0);
  const ct = document.getElementById('content');
  if(!filtered.length){
    ct.innerHTML = channels.length ? '<div class="empty"><h3>אין סרטונים להצגה</h3><p>נסה לנקות את הסינון או את החיפוש</p></div>' : '<div class="empty"><h3>לא נמצאו מנויים</h3><p>לחשבון היוטיוב שלך אין כרגע ערוצים במעקב</p></div>';
    return;
  }
  ct.innerHTML = `<div class="grid">${rest.map(v => `
    <div class="card" onclick='openModalById("${v.id}")'>
      <div class="thumb"><img src="${x(v.thumb)}">${new Date(v.publishedAt) > lastCheck ? '<span class="new-tag">חדש</span>' : ''}</div>
      <div class="c-body"><div class="c-av"><img src="${x(v.chThumb||'')}"></div><div><div class="c-title">${x(v.title)}</div><div class="c-ch">${x(v.chTitle)} · ${timeAgo(v.publishedAt)}</div></div></div>
    </div>`).join('')}</div>`;
}
function openModalById(id){ const v = videos.find(v=>v.id===id); if(v) openModal(v); }
function openModal(v){
  document.getElementById('modal-player').innerHTML = `<iframe src="https://www.youtube.com/embed/${v.id}?autoplay=1" allow="autoplay;encrypted-media" allowfullscreen></iframe>`;
  document.getElementById('modal-info').innerHTML = `<div style="font-size:16px;font-weight:600;margin-bottom:6px">${x(v.title)}</div><div style="font-size:13px;opacity:.8">${x(v.chTitle)} · ${timeAgo(v.publishedAt)}</div>`;
  document.getElementById('modal').classList.add('open');
}
function closeModal(){ document.getElementById('modal').classList.remove('open'); document.getElementById('modal-player').innerHTML=''; }

function renderNotifications(){
  const fresh = videos.filter(v => new Date(v.publishedAt) > lastCheck).slice(0, 30);
  const badge = document.getElementById('notif-badge');
  if(fresh.length){ badge.style.display='flex'; badge.textContent = fresh.length > 9 ? '9+' : fresh.length; } else badge.style.display='none';
  const list = document.getElementById('notif-list');
  list.innerHTML = fresh.length ? fresh.map(v => `<div class="notif-item" onclick='openModalById("${v.id}")'><div class="notif-av"><img src="${x(v.chThumb||'')}"></div><div><div class="notif-txt"><b>${x(v.chTitle)}</b> העלה סרטון חדש: ${x(v.title)}</div><div class="notif-time">${timeAgo(v.publishedAt)}</div></div></div>`).join('') : '<div class="sb-empty" style="padding:24px">אין התראות חדשות</div>';
}
function markAllRead(){ localStorage.setItem('ms_lastcheck', Date.now()); location.reload(); }
function togglePanel(id){ document.getElementById(id).classList.toggle('open'); }
document.addEventListener('click', e => {
  ['notif-panel'].forEach(id=>{ const p=document.getElementById(id); if(p.classList.contains('open') && !p.contains(e.target) && !e.target.closest('.tbtn')) p.classList.remove('open'); });
});
document.getElementById('search-input').addEventListener('input', renderFeed);
</script>
</body>
</html>
