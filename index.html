<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyTube</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
body.light {
  --bg:#ffffff; --bg2:#f9f9f9; --bg3:#f1f1f1; --bg4:#e0e0e0;
  --txt:#0f0f0f; --txt2:#555; --txt3:#888;
  --skel1:#e8e8e8; --skel2:#d0d0d0;
  --border:rgba(0,0,0,0.08); --shadow:rgba(0,0,0,0.12);
}
body.dark {
  --bg:#0f0f0f; --bg2:#1a1a1a; --bg3:#272727; --bg4:#3f3f3f;
  --txt:#f1f1f1; --txt2:#aaa; --txt3:#717171;
  --skel1:#272727; --skel2:#3f3f3f;
  --border:rgba(255,255,255,0.08); --shadow:rgba(0,0,0,0.5);
}
:root{--red:#ff0000;--red2:#cc0000;--blue:#3ea6ff;--sw:240px;--sc:72px;--th:56px;--ease:0.2s cubic-bezier(0.4,0,0.2,1);}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--txt);font-family:'Rubik',sans-serif;overflow-x:hidden;min-height:100vh;transition:background .2s,color .2s;}

/* TOPBAR */
#topbar{position:fixed;top:0;left:0;right:0;height:var(--th);background:var(--bg);display:flex;align-items:center;padding:0 16px;gap:10px;z-index:200;border-bottom:1px solid var(--border);backdrop-filter:blur(8px);}
.tbtn{background:none;border:none;cursor:pointer;color:var(--txt);width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background var(--ease);}
.tbtn:hover{background:var(--bg3);}
.tbtn svg{width:22px;height:22px;fill:currentColor;}
#logo{display:flex;align-items:center;gap:6px;text-decoration:none;flex-shrink:0;cursor:pointer;}
.logo-badge{background:var(--red);border-radius:8px;width:34px;height:24px;display:flex;align-items:center;justify-content:center;transition:transform var(--ease),box-shadow var(--ease);}
#logo:hover .logo-badge{transform:scale(1.08);box-shadow:0 0 16px rgba(255,0,0,.4);}
.logo-badge svg{width:15px;height:15px;fill:#fff;}
.logo-txt{font-size:17px;font-weight:700;letter-spacing:-.5px;color:var(--txt);}
.logo-txt span{color:var(--red);}
.tb-r{display:flex;align-items:center;gap:8px;margin-inline-start:auto;flex-shrink:0;}

/* SIGN IN / USER CHIP */
.yt-login-btn{background:var(--red);color:#fff;border:none;border-radius:20px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Rubik',sans-serif;display:flex;align-items:center;gap:7px;transition:background var(--ease);flex-shrink:0;}
.yt-login-btn:hover{background:var(--red2);}
.yt-login-btn svg{width:16px;height:16px;}
.yt-user-chip{display:flex;align-items:center;gap:7px;background:var(--bg3);border:1px solid var(--bg4);border-radius:20px;padding:3px 12px 3px 3px;cursor:pointer;transition:background var(--ease);}
.yt-user-chip:hover{background:var(--bg4);}
.yt-user-av{width:28px;height:28px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--bg4);}
.yt-user-name{font-size:12px;font-weight:500;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* USER MENU */
#user-menu{position:fixed;top:calc(var(--th) + 8px);left:12px;width:230px;background:var(--bg2);border:1px solid var(--bg4);border-radius:12px;box-shadow:0 8px 32px var(--shadow);z-index:300;padding:8px;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;transform:translateY(-8px);}
#user-menu.open{opacity:1;pointer-events:all;transform:translateY(0);}
.um-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;font-size:13px;transition:background var(--ease);}
.um-item:hover{background:var(--bg3);}
.um-item svg{width:17px;height:17px;fill:currentColor;flex-shrink:0;}

/* BELL / NOTIFICATIONS */
.bell-wrap{position:relative;}
.notif-badge{position:absolute;top:4px;right:4px;min-width:16px;height:16px;border-radius:8px;background:var(--red);font-size:10px;font-weight:700;display:none;align-items:center;justify-content:center;color:#fff;pointer-events:none;border:2px solid var(--bg);padding:0 3px;}
.notif-badge.show{display:flex;}
#notif-panel{position:fixed;top:calc(var(--th) + 8px);left:60px;width:340px;max-height:70vh;overflow-y:auto;background:var(--bg2);border:1px solid var(--bg4);border-radius:12px;box-shadow:0 8px 32px var(--shadow);z-index:300;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;transform:translateY(-8px);}
#notif-panel.open{opacity:1;pointer-events:all;transform:translateY(0);}
.np-hdr{padding:12px 16px;font-size:14px;font-weight:700;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);display:flex;align-items:center;justify-content:space-between;gap:10px;}
.np-hdr-btn{background:var(--bg3);border:1px solid var(--bg4);color:var(--txt2);border-radius:14px;padding:5px 10px;font-size:11px;font-weight:500;cursor:pointer;font-family:'Rubik',sans-serif;white-space:nowrap;transition:background var(--ease);}
.np-hdr-btn:hover{background:var(--bg4);color:var(--txt);}
.np-item{display:flex;gap:10px;padding:10px 14px;cursor:pointer;transition:background var(--ease);border-bottom:1px solid var(--border);}
.np-item:hover{background:var(--bg3);}
.np-thumb{width:100px;aspect-ratio:16/9;border-radius:6px;object-fit:cover;flex-shrink:0;background:var(--bg3);}
.np-title{font-size:12.5px;font-weight:500;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.np-ch{font-size:11px;color:var(--txt3);margin-top:4px;}
.np-empty{padding:28px 16px;text-align:center;font-size:12.5px;color:var(--txt3);}

/* SIDEBAR */
#sidebar{position:fixed;top:var(--th);right:0;width:var(--sw);height:calc(100vh - var(--th));background:var(--bg);overflow-y:auto;overflow-x:hidden;padding:10px 0 24px;z-index:100;transition:width var(--ease);scrollbar-width:thin;scrollbar-color:var(--bg4) transparent;}
#sidebar.col{width:var(--sc);}
#sidebar::-webkit-scrollbar{width:4px;}
#sidebar::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px;}

.nitem{display:flex;align-items:center;gap:14px;height:40px;padding:0 20px;cursor:pointer;color:var(--txt2);transition:background var(--ease),color var(--ease);white-space:nowrap;overflow:hidden;border-radius:20px;margin:2px 10px;}
.nitem:hover{background:var(--bg3);color:var(--txt);}
.nitem.on{background:var(--bg3);color:var(--txt);font-weight:600;}
.nitem.on .ni{color:var(--red);}
.ni{width:22px;height:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ni svg{width:20px;height:20px;fill:currentColor;}
.nl{font-size:13.5px;overflow:hidden;text-overflow:ellipsis;}
.sb-div{height:1px;background:var(--border);margin:10px 12px;}
#sidebar.col .nitem{justify-content:center;padding:0;margin-inline-end:0;border-radius:50%;width:44px;height:44px;margin-inline-start:14px;}
#sidebar.col .nl{display:none;}

.sb-label{font-size:11px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.8px;padding:8px 20px 6px;white-space:nowrap;overflow:hidden;transition:opacity var(--ease),height var(--ease),padding var(--ease);height:26px;}
#sidebar.col .sb-label{opacity:0;height:0;padding:0;}
.chitem{display:flex;align-items:center;gap:10px;height:42px;padding:0 12px 0 8px;cursor:pointer;border-radius:10px;margin:2px 8px;transition:background var(--ease);color:var(--txt);white-space:nowrap;overflow:hidden;}
.chitem:hover{background:var(--bg3);}
.chitem.active{background:var(--bg3);}
.chdot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;position:relative;overflow:hidden;background:var(--bg4);}
.chdot .ndot{position:absolute;top:-2px;right:-2px;width:9px;height:9px;border-radius:50%;background:var(--red);border:2px solid var(--bg);display:none;z-index:2;}
.chdot.hn .ndot{display:block;}
.chdot img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.chname{font-size:13px;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;}
#sidebar.col .chitem{padding:0;justify-content:center;gap:0;}
#sidebar.col .chname{display:none;}
.sb-empty{padding:10px 20px;font-size:12px;color:var(--txt3);line-height:1.6;}

/* MAIN */
#main{margin-top:var(--th);margin-right:var(--sw);padding:22px 28px;transition:margin-right var(--ease);min-height:calc(100vh - var(--th));}
#main.col{margin-right:var(--sc);}

/* FILTER CHIPS / TOOLBAR */
.filter-chips{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center;}
.fchip{background:var(--bg3);border:1px solid var(--bg4);color:var(--txt2);border-radius:20px;padding:7px 16px;font-size:13px;font-weight:500;cursor:pointer;font-family:'Rubik',sans-serif;transition:all var(--ease);white-space:nowrap;display:flex;align-items:center;gap:6px;}
.fchip:hover{border-color:var(--red);color:var(--red);}
.fchip.on{background:var(--red);border-color:var(--red);color:#fff;}
.fchip svg{width:14px;height:14px;fill:currentColor;}
.toolbar-spacer{flex:1;}
.refresh-btn{background:var(--bg3);border:1px solid var(--bg4);color:var(--txt2);border-radius:20px;padding:7px 14px;font-size:12.5px;cursor:pointer;font-family:'Rubik',sans-serif;display:flex;align-items:center;gap:6px;transition:all var(--ease);}
.refresh-btn:hover{background:var(--bg4);}
.refresh-btn svg{width:14px;height:14px;fill:currentColor;}
.refresh-btn.spin svg{animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.section-title{font-size:18px;font-weight:700;margin-bottom:14px;}

/* HOME PAGE SECTIONS */
.home-section{margin-bottom:34px;}
.home-section:last-child{margin-bottom:0;}
.home-section-title{
  font-size:19px;
  font-weight:800;
  margin-bottom:16px;
  padding-inline-start:14px;
  border-inline-start:4px solid var(--red);
  letter-spacing:-.2px;
  line-height:1.2;
}
.shelf-wrap{display:flex;align-items:center;gap:10px;}
.shelf-nav{flex:0 0 auto;width:36px;height:36px;border-radius:50%;background:var(--bg3);border:1px solid var(--bg4);color:var(--txt2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background var(--ease),color var(--ease);}
.shelf-nav:hover{background:var(--bg4);color:var(--txt);}
.shelf-nav svg{width:18px;height:18px;fill:currentColor;}
.vgrid.shelf-scroll{display:flex;flex-wrap:nowrap;overflow-x:auto;gap:14px;padding-bottom:0;flex:1;min-width:0;scrollbar-width:none;-ms-overflow-style:none;}
.vgrid.shelf-scroll::-webkit-scrollbar{display:none;}
.vgrid.shelf-scroll .vcard{flex:0 0 260px;}
.vgrid.shelf-scroll.shorts-grid .vcard{flex:0 0 170px;}

/* CHANNEL PAGE HEADER */
.channel-header{display:flex;align-items:center;gap:16px;margin-bottom:24px;}
.channel-header .ch-av{width:56px;height:56px;border-radius:50%;flex-shrink:0;overflow:hidden;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;}
.channel-header .ch-av img{width:100%;height:100%;object-fit:cover;}
.channel-header .ch-name{font-size:20px;font-weight:800;}
.channel-header .ch-sub{font-size:12.5px;color:var(--txt3);margin-top:3px;}

/* EMPTY / SIGN-IN STATE */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:80px 20px;color:var(--txt2);}
.eico{width:64px;height:64px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;margin-bottom:18px;}
.eico svg{width:30px;height:30px;fill:var(--txt3);}
.empty h3{font-size:17px;font-weight:700;margin-bottom:8px;color:var(--txt);}
.empty p{font-size:13px;color:var(--txt3);max-width:340px;line-height:1.6;margin-bottom:18px;}
.empty code{background:var(--bg3);padding:2px 6px;border-radius:4px;font-size:11.5px;direction:ltr;display:inline-block;}

/* VIDEO GRID */
.vgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px 16px;}
.vcard{cursor:pointer;position:relative;}
.vthumb-wrap{position:relative;border-radius:12px;overflow:hidden;aspect-ratio:16/9;background:var(--bg3);margin-bottom:10px;}
.vthumb-wrap img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s;}
.vcard:hover .vthumb-wrap img{transform:scale(1.03);}
.vdur{position:absolute;bottom:6px;left:6px;background:rgba(0,0,0,.8);color:#fff;font-size:11px;font-weight:600;padding:2px 6px;border-radius:4px;}
.short-flag{position:absolute;top:8px;right:8px;width:24px;height:24px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;}
.short-flag svg{width:13px;height:13px;fill:#fff;}
.new-flag{position:absolute;top:8px;left:8px;background:var(--blue);color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:12px;}
.wl-btn{position:absolute;bottom:6px;right:6px;width:26px;height:26px;border-radius:50%;background:rgba(0,0,0,.6);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,transform .15s;z-index:2;}
.wl-btn svg{width:14px;height:14px;fill:#fff;}
.wl-btn:hover{transform:scale(1.12);}
.wl-btn.on{background:var(--red);}
.like-btn{position:absolute;bottom:6px;right:38px;width:26px;height:26px;border-radius:50%;background:rgba(0,0,0,.6);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,transform .15s;z-index:2;}
.like-btn svg{width:14px;height:14px;fill:#fff;}
.like-btn:hover{transform:scale(1.12);}
.like-btn.on svg{fill:var(--red);}
.vinfo{display:flex;gap:10px;}
.vav{width:34px;height:34px;border-radius:50%;flex-shrink:0;overflow:hidden;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;cursor:pointer;}
.vav img{width:100%;height:100%;object-fit:cover;}
.vtext{min-width:0;flex:1;}
.vtitle{font-size:14px;font-weight:600;line-height:1.35;color:var(--txt);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:4px;}
.vch{font-size:12.5px;color:var(--txt3);cursor:pointer;}
.vch:hover{color:var(--txt);text-decoration:underline;}
.vmeta{font-size:11.5px;color:var(--txt3);}

/* SHORTS GRID variant */
.vgrid.shorts-grid{grid-template-columns:repeat(auto-fill,minmax(170px,1fr));}
.vgrid.shorts-grid .vthumb-wrap{aspect-ratio:9/16;}

/* ENLARGED GRID (home page, when inline playback mode is on) */
.vgrid.vgrid-large{grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:28px 22px;}
.vgrid.vgrid-large .vtitle{font-size:15.5px;}
.vgrid.vgrid-large .vch,.vgrid.vgrid-large .vmeta{font-size:12.5px;}
.vgrid.vgrid-large .vav{width:40px;height:40px;}

/* PLAYER MODAL */
#player-modal{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;display:none;align-items:center;justify-content:center;padding:20px;}
#player-modal.open{display:flex;}
.pm-box{width:100%;max-width:900px;}
.pm-frame-wrap{position:relative;aspect-ratio:16/9;background:#000;border-radius:12px;overflow:hidden;}
.pm-frame-wrap.short-mode{aspect-ratio:9/16;max-width:400px;margin:0 auto;}
.pm-frame-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none;}
.pm-close{position:absolute;top:-44px;left:0;background:none;border:none;color:#fff;cursor:pointer;padding:6px;}
.pm-close svg{width:26px;height:26px;fill:currentColor;}
.pm-title{color:#fff;font-size:15px;font-weight:600;margin-top:14px;line-height:1.4;}
.pm-ch{color:rgba(255,255,255,.65);font-size:12.5px;margin-top:6px;}

/* SETTINGS MODAL */
#settings-modal{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:550;display:none;align-items:center;justify-content:center;padding:20px;}
#settings-modal.open{display:flex;}
.st-box{width:100%;max-width:380px;background:var(--bg2);border-radius:16px;padding:20px;box-shadow:0 8px 40px var(--shadow);}
.st-box h3{font-size:16px;margin-bottom:14px;}
.st-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 0;border-bottom:1px solid var(--border);}
.st-row:last-of-type{border-bottom:none;}
.st-row span{font-size:13px;}
.st-btn{background:var(--bg3);border:1px solid var(--bg4);color:var(--txt2);border-radius:16px;padding:6px 14px;font-size:12px;cursor:pointer;font-family:'Rubik',sans-serif;flex-shrink:0;display:inline-flex;align-items:center;gap:6px;}
.st-btn svg{width:14px;height:14px;fill:currentColor;}
.st-btn:hover{background:var(--bg4);}
.st-btn.danger{color:#ff5c5c;}
.st-btn.on{background:var(--red);border-color:var(--red);color:#fff;}
.st-close{margin-top:16px;width:100%;background:var(--red);color:#fff;border:none;border-radius:20px;padding:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Rubik',sans-serif;}

/* SKELETON */
.skel{background:linear-gradient(90deg,var(--skel1) 25%,var(--skel2) 37%,var(--skel1) 63%);background-size:400% 100%;animation:shimmer 1.4s infinite;border-radius:12px;}
@keyframes shimmer{0%{background-position:100% 0}100%{background-position:0 0}}
.skel-card .vthumb-wrap{background:none;}
.skel-line{height:12px;border-radius:4px;margin-bottom:6px;}

/* TOAST */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg4);color:var(--txt);padding:10px 20px;border-radius:24px;font-size:13px;opacity:0;pointer-events:none;transition:all .25s;z-index:600;box-shadow:0 4px 20px var(--shadow);}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media(max-width:760px){
  :root{--sw:0px;}
  #sidebar{transform:translateX(100%);width:260px !important;box-shadow:-8px 0 24px var(--shadow);}
  #sidebar.mobopen{transform:translateX(0);}
  #main{margin-right:0 !important;padding:16px;}
  #notif-panel{left:8px;right:8px;width:auto;}
}
</style>
</head>
<body class="dark">

<div id="topbar">
  <button class="tbtn" id="sidebar-toggle" title="תפריט">
    <svg viewBox="0 0 24 24"><path d="M3 6h18v2H3V6zm0 5h18v2H3v-2zm0 5h18v2H3v-2z"/></svg>
  </button>
  <a id="logo" onclick="resetHome()">
    <div class="logo-badge"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
    <div class="logo-txt">My<span>Tube</span></div>
  </a>
  <div class="tb-r">
    <button class="tbtn" id="theme-toggle" title="ערכת נושא">
      <svg viewBox="0 0 24 24"><path d="M12 3a9 9 0 109 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 01-4.4 2.26 5.403 5.403 0 01-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></svg>
    </button>
    <div class="bell-wrap">
      <button class="tbtn" id="bell-btn" title="התראות">
        <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
        <span class="notif-badge" id="notif-badge">0</span>
      </button>
      <div id="notif-panel">
        <div class="np-hdr">
          <span>התראות</span>
          <button class="np-hdr-btn" onclick="markAllSeen()">סמן הכל כנקרא</button>
        </div>
        <div id="notif-list"></div>
      </div>
    </div>
    <button class="tbtn" id="settings-btn" title="הגדרות" onclick="toggleSettings()">

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
/* ============ CONFIG ============ */
const GOOGLE_CLIENT_ID = '426523025549-7c50rkn7cun4vmm2r802u0ij6egjehtg.apps.googleusercontent.com';
const YT_SCOPE = 'https://www.googleapis.com/auth/youtube.readonly';
// הדבק כאן את כתובת ה-Web App שקיבלת מפריסת Code.gs (ראה הוראות שם).
// זהו שרת-ביניים שמעביר את הטוקן האישי שלך ל-YouTube API משרתי גוגל,
// כדי לעקוף חסימת רשת מקומית (למשל NetFree) על googleapis.com.
const APPS_SCRIPT_URL = 'https://sound.pythonanywhere.com/mytube';

const SEEN_KEY  = 'mytube_seen';        // {channelId: isoTimestamp}
const CHANNELS_CACHE_KEY = 'mytube_channels_cache';
const VIDEOS_CACHE_KEY = 'mytube_videos_cache';
const ME_CACHE_KEY = 'mytube_me_cache';
const THEME_KEY = 'mytube_theme';
const SIDEBAR_KEY = 'mytube_sidebar_col';
const WATCH_HISTORY_KEY = 'mytube_watch_history';
const WATCH_LATER_KEY = 'mytube_watch_later';
const LIKED_KEY = 'mytube_liked';
const INLINE_MODE_KEY = 'mytube_inline_mode';
const TOKEN_KEY = 'mytube_gtoken'; // sessionStorage: {access_token, expires_at}

let currentUser = null;      // {name, picture, channelId}
let channels = [];           // subscribed channels [{id,title,thumb}]
let allVideos = [];          // merged videos from all subscribed channels
let likedVideos = [];        // local-only "liked" list (heart button)
let watchHistory = [];       // local-only "watched" list
let watchLater = [];         // local-only "watch later" list
let section = 'all';         // all | shorts | following | liked | recommended | watched | watchlater | personal | channel
let activeChannelFilter = null;
let inlineMode = false;
let activeInlineId = null;
let loading = false;
let lastError = null;

const EMPTY_MESSAGES = {
  shorts: 'לא נמצאו שורטס מהערוצים שאתה עוקב אחריהם.',
  following: 'לא נמצאו סרטונים מהערוצים שאתה עוקב אחריהם.',
  liked: 'עדיין לא סימנת "אהבתי" לאף סרטון דרך האתר. אפשר לסמן דרך הלב הקטן שמופיע על כל כרטיס.',
  recommended: 'עדיין אין מספיק היסטוריית צפייה כדי להמליץ על משהו. ככל שתצפה ביותר סרטונים דרך האתר, ההמלצות כאן ישתפרו.',
  watched: 'עדיין לא צפית בסרטונים דרך האתר. כל סרטון שתפתח יופיע כאן.',
  watchlater: 'הרשימה ריקה. אפשר להוסיף סרטון דרך כפתור הסימנייה שמופיע על כל כרטיס.',
  channel: 'לא נמצאו סרטונים מהערוץ הזה.'
};

/* ============ URL ROUTING ============ */
const SECTION_PATH = {
  all: 'דף-הבית',
  recommended: 'מומלצים',
  liked: 'אהבתי',
  following: 'עוקב-אחרי',
  watched: 'צפיתי',
  watchlater: 'לצפייה-מאוחרת',
  shorts: 'שורטס',
  personal: 'אזור-אישי'
};
const PATH_SECTION = Object.keys(SECTION_PATH).reduce(function (acc, k) {
  acc[SECTION_PATH[k]] = k;
  return acc;
}, {});
const CHANNEL_SEG = 'ערוץ';
let basePath = '';

function restoreRedirectFromNotFound() {
  const params = new URLSearchParams(location.search);
  const redirect = params.get('__redirect');
  if (redirect == null) return;
  const q = params.get('__q');
  const newPath = location.pathname.replace(/\/+$/, '') + redirect;
  const newUrl = newPath + (q ? ('?' + q) : '') + location.hash;
  history.replaceState(null, '', newUrl);
}

function computeBasePath() {
  const path = location.pathname.replace(/\/+$/, '');
  const segs = path.split('/');
  if (segs.length >= 2 && decodeURIComponent(segs[segs.length - 2] || '') === CHANNEL_SEG) {
    return segs.slice(0, segs.length - 2).join('/');
  }
  const last = decodeURIComponent(segs[segs.length - 1] || '');
  if (PATH_SECTION[last]) {
    return segs.slice(0, segs.length - 1).join('/');
  }
  return path;
}

function restoreStateFromUrl() {
  let rel = location.pathname.replace(/\/+$/, '');
  if (basePath && rel.indexOf(basePath) === 0) rel = rel.slice(basePath.length);
  rel = rel.replace(/^\/+/, '');
  const segs = rel.split('/').filter(Boolean).map(decodeURIComponent);
  if (segs.length === 2 && segs[0] === CHANNEL_SEG) {
    section = 'channel';
    activeChannelFilter = segs[1];
    return;
  }
  if (segs.length === 1 && PATH_SECTION[segs[0]]) {
    section = PATH_SECTION[segs[0]];
    activeChannelFilter = null;
    return;
  }
  section = 'all';
  activeChannelFilter = null;
}

function pathSegmentForState() {
  if (section === 'channel' && activeChannelFilter) {
    return CHANNEL_SEG + '/' + encodeURIComponent(activeChannelFilter);
  }
  return SECTION_PATH[section] || SECTION_PATH.all;
}

function updateUrl() {
  const seg = pathSegmentForState();
  const newPath = (basePath || '') + '/' + seg;
  if (location.pathname.replace(/\/+$/, '') !== newPath.replace(/\/+$/, '')) {
    history.pushState({ section: section, activeChannelFilter: activeChannelFilter }, '', newPath);
  }
}

function syncSidebarActiveClass() {
  document.querySelectorAll('.nitem').forEach(function (n) { n.classList.remove('on'); });
  const el = document.getElementById('n-' + section);
  if (el) el.classList.add('on');
}

/* ============ INIT ============ */
window.addEventListener('load', () => {
  restoreRedirectFromNotFound();
  basePath = computeBasePath();
  restoreStateFromUrl();

  document.body.className = localStorage.getItem(THEME_KEY) || 'dark';
  if (localStorage.getItem(SIDEBAR_KEY) === '1') {
    document.getElementById('sidebar').classList.add('col');
    document.getElementById('main').classList.add('col');
  }
  try { seenMap = JSON.parse(localStorage.getItem(SEEN_KEY) || '{}'); } catch(e){ seenMap = {}; }
  loadCachedChannels();
  loadCachedVideos();
  loadCachedMe();
  loadLocalLists();
  inlineMode = localStorage.getItem(INLINE_MODE_KEY) === '1';
  updateInlineToggleUI();
  renderAuthArea();
  renderChannels();
  syncSidebarActiveClass();
  updateUrl();
  renderContent();
  updateNotifBadge();
  bindUI();
  initGoogleAuth();
  restoreSessionAndMaybeLoad();
});

window.addEventListener('popstate', () => {
  restoreStateFromUrl();
  syncSidebarActiveClass();
  activeInlineId = null;
  renderChannels();
  renderContent();
});

let seenMap = {};

function loadLocalLists() {
  try { watchHistory = JSON.parse(localStorage.getItem(WATCH_HISTORY_KEY) || '[]'); } catch(e){ watchHistory = []; }
  try { watchLater = JSON.parse(localStorage.getItem(WATCH_LATER_KEY) || '[]'); } catch(e){ watchLater = []; }
  try { likedVideos = JSON.parse(localStorage.getItem(LIKED_KEY) || '[]'); } catch(e){ likedVideos = []; }
}

/* ============ GOOGLE SIGN-IN (client-side OAuth, no backend) ============ */
// כל משתמש מתחבר עם חשבון הגוגל שלו ישירות מהדפדפן (ללא Apps Script
// ביניים). ה-token שמתקבל משמש לקריאה ישירה ל-YouTube Data API v3 עבור
// המנויים והסרטונים *של אותו משתמש בלבד*. שים לב: הדפדפן חייב להיות
// מסוגל לגשת ל-googleapis.com ו-accounts.google.com (בניגוד לגרסה
// הקודמת שהתגברה על חסימת רשת דרך שרת ביניים).
let tokenClient = null;
let accessToken = null;
let tokenExpiresAt = 0; // epoch ms
let gsiReady = false;

function initGoogleAuth() {
  function tryInit() {
    if (!(window.google && google.accounts && google.accounts.oauth2)) {
      setTimeout(tryInit, 200);
      return;
    }
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: GOOGLE_CLIENT_ID,
      scope: YT_SCOPE,
      callback: onTokenResponse
    });
    gsiReady = true;
  }
  tryInit();
}

function restoreSessionAndMaybeLoad() {
  const stored = getStoredToken();
  if (stored && stored.access_token && stored.expires_at > Date.now() + 60000) {
    accessToken = stored.access_token;
    tokenExpiresAt = stored.expires_at;
    renderAuthArea();
    loadEverything(false);
  } else if (!currentUser) {
    lastError = 'not_authenticated';
    renderContent();
  }
}

function getStoredToken() {
  try { return JSON.parse(sessionStorage.getItem(TOKEN_KEY) || 'null'); } catch (e) { return null; }
}
function setStoredToken(tok) {
  sessionStorage.setItem(TOKEN_KEY, JSON.stringify(tok));
}
function clearStoredToken() {
  sessionStorage.removeItem(TOKEN_KEY);
}

function onTokenResponse(resp) {
  if (!resp || resp.error) {
    console.error('OAuth error', resp);
    toast('ההתחברות עם Google נכשלה או בוטלה');
    loading = false;
    setRefreshSpin(false);
    return;
  }
  accessToken = resp.access_token;
  tokenExpiresAt = Date.now() + (Number(resp.expires_in || 3500) * 1000);
  setStoredToken({ access_token: accessToken, expires_at: tokenExpiresAt });
  lastError = null;
  loadEverything(true);
}

function signIn() {
  if (!gsiReady || !tokenClient) {
    toast('טוען את מסך ההתחברות של Google...');
    setTimeout(() => { if (gsiReady) signIn(); }, 400);
    return;
  }
  tokenClient.requestAccessToken({ prompt: accessToken ? '' : 'consent' });
}

function signOut() {
  const tok = accessToken;
  accessToken = null;
  tokenExpiresAt = 0;
  clearStoredToken();
  currentUser = null;
  channels = [];
  allVideos = [];
  lastError = 'not_authenticated';
  localStorage.removeItem(CHANNELS_CACHE_KEY);
  localStorage.removeItem(VIDEOS_CACHE_KEY);
  localStorage.removeItem(ME_CACHE_KEY);
  renderAuthArea();
  renderChannels();
  renderContent();
  updateNotifBadge();
  toggleUserMenu(false);
  toast('התנתקת');
  if (tok && window.google && google.accounts && google.accounts.oauth2) {
    try { google.accounts.oauth2.revoke(tok, () => {}); } catch (e) {}
  }
}

/* ============ DATA LOADING (via Apps Script token-relay proxy) ============ */
// הקריאה בפועל ל-YouTube API לא יוצאת מהדפדפן (שעלול להיות חסום מול
// googleapis.com), אלא מה-Web App של Apps Script (Code.gs), שמקבל את
// הטוקן האישי של המשתמש כפרמטר ומבצע את הקריאה בשמו משרתי גוגל.
async function loadEverything(forceToast) {
  if (loading) return;
  if (!accessToken) {
    lastError = 'not_authenticated';
    renderContent();
    return;
  }
  if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL.indexOf('PASTE_YOUR') === 0) {
    lastError = 'not_configured';
    renderContent();
    return;
  }
  loading = true;
  lastError = null;
  setRefreshSpin(true);
  try {
    const url = APPS_SCRIPT_URL
      + (APPS_SCRIPT_URL.includes('?') ? '&' : '?')
      + 'action=all&access_token=' + encodeURIComponent(accessToken)
      + '&t=' + Date.now();
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data.error) {
      if (typeof data.error === 'string' && data.error.indexOf('AUTH_EXPIRED::') === 0) {
        accessToken = null;
        clearStoredToken();
        const realMsg = data.error.slice('AUTH_EXPIRED::'.length);
        throw new Error('AUTH_EXPIRED::' + realMsg);
      }
      throw new Error(data.error);
    }

    currentUser = data.me || null;
    channels = data.channels || [];
    allVideos = data.videos || [];

    localStorage.setItem(CHANNELS_CACHE_KEY, JSON.stringify(channels));
    localStorage.setItem(VIDEOS_CACHE_KEY, JSON.stringify(allVideos.slice(0, 300)));
    localStorage.setItem(ME_CACHE_KEY, JSON.stringify(currentUser));

    renderAuthArea();
    renderChannels();
    renderContent();
    updateNotifBadge();
    renderNotifPanel();
    if (forceToast) toast('הנתונים עודכנו');
  } catch (e) {
    console.error(e);
    const msg = (e && e.message) || 'שגיאה בטעינת הנתונים';
    if (msg.indexOf('AUTH_EXPIRED::') === 0) {
      const realMsg = msg.slice('AUTH_EXPIRED::'.length) || 'פג תוקף ההתחברות';
      currentUser = null;
      // מציגים את ההודעה האמיתית מגוגל (לא רק "פג תוקף"), כדי שאפשר
      // יהיה לאבחן את הסיבה האמיתית ל-401 במקום להניח תמיד שזה טוקן
      // שפג.
      lastError = 'שגיאת אימות מול Google: ' + realMsg;
      toast('שגיאת אימות: ' + realMsg);
    } else {
      lastError = msg;
      toast('שגיאה בטעינת הנתונים');
    }
    renderContent();
  } finally {
    loading = false;
    setRefreshSpin(false);
  }
}

function loadCachedChannels() {
  try { channels = JSON.parse(localStorage.getItem(CHANNELS_CACHE_KEY) || '[]'); } catch(e){ channels = []; }
}
function loadCachedVideos() {
  try { allVideos = JSON.parse(localStorage.getItem(VIDEOS_CACHE_KEY) || '[]'); } catch(e){ allVideos = []; }
}
function loadCachedMe() {
  try { currentUser = JSON.parse(localStorage.getItem(ME_CACHE_KEY) || 'null'); } catch(e){ currentUser = null; }
}

function manualRefresh() {
  loadEverything(true);
}

/* ============ RENDER: SIDEBAR CHANNELS ============ */
function renderChannels() {
  const list = document.getElementById('sb-chs');
  const label = document.getElementById('sb-label');
  if (!channels.length) {
    label.textContent = 'ערוצים שלי';
    list.innerHTML = `<div class="sb-empty">${lastError ? 'לא ניתן לטעון ערוצים כרגע.' : 'טוען ערוצים...'}</div>`;
    return;
  }
  label.textContent = `ערוצים שלי (${channels.length})`;
  list.innerHTML = channels.map(c => {
    const hasNew = channelHasNew(c.id);
    return `
    <div class="chitem ${activeChannelFilter === c.id ? 'active' : ''}" onclick="filterByChannel('${x(c.id)}')" title="${x(c.title)}">
      <div class="chdot ${hasNew ? 'hn' : ''}">
        ${c.thumb ? `<img src="${x(c.thumb)}">` : x((c.title||'?').slice(0,2))}
        <span class="ndot"></span>
      </div>

function filterByChannel(channelId) {
  activeChannelFilter = activeChannelFilter === channelId ? null : channelId;
  if (activeChannelFilter && !['all','following','shorts'].includes(section)) {
    section = 'all';
    syncSidebarActiveClass();
  }
  renderChannels();
  renderContent();
}

function channelHasNew(channelId) {
  const seenAt = seenMap[channelId];
  if (!seenAt) {
    return allVideos.some(v => v.channelId === channelId);
  }
  return allVideos.some(v => v.channelId === channelId && new Date(v.publishedAt) > new Date(seenAt));
}

/* ============ SECTIONS ============ */
function setSection(name, el) {
  section = name;
  activeChannelFilter = null;
  syncSidebarActiveClass();
  if (el) el.classList.add('on');
  activeInlineId = null;
  renderChannels();
  renderContent();
  updateUrl();
}

function resetHome() {
  setSection('all', document.getElementById('n-all'));
}

function openChannelPage(channelId) {
  section = 'channel';
  activeChannelFilter = channelId;
  syncSidebarActiveClass();
  activeInlineId = null;
  renderChannels();
  renderContent();
  updateUrl();
}

function applyChannelFilter(v) {
  return !activeChannelFilter || v.channelId === activeChannelFilter;
}

function getSectionVideos() {
  if (section === 'channel') return allVideos.filter(v => v.channelId === activeChannelFilter);
  if (section === 'shorts') return allVideos.filter(v => v.isShort).filter(applyChannelFilter);
  if (section === 'following') return allVideos.filter(applyChannelFilter);
  if (section === 'liked') return likedVideos;
  if (section === 'recommended') return computeRecommended();
  if (section === 'watched') return watchHistory;
  if (section === 'watchlater') return watchLater;
  return allVideos.filter(applyChannelFilter); // 'all' + fallback
}

function computeRecommended() {
  const freq = {};
  watchHistory.forEach(function (h) { freq[h.channelId] = (freq[h.channelId] || 0) + 1; });
  likedVideos.forEach(function (h) { freq[h.channelId] = (freq[h.channelId] || 0) + 1; });
  if (!Object.keys(freq).length) return [];

  const watchedIds = new Set(watchHistory.map(function (h) { return h.id; }));
  const rankedChannels = Object.keys(freq).sort(function (a, b) { return freq[b] - freq[a]; });
  const topSet = new Set(rankedChannels.slice(0, 8));

  return allVideos
    .filter(function (v) { return topSet.has(v.channelId) && !watchedIds.has(v.id); })
    .sort(function (a, b) {
      const fa = freq[a.channelId] || 0, fb = freq[b.channelId] || 0;
      if (fb !== fa) return fb - fa;
      return new Date(b.publishedAt) - new Date(a.publishedAt);
    })
    .slice(0, 60);
}

function findVideoById(id) {
  const pools = [allVideos, likedVideos, watchHistory, watchLater];
  for (let i = 0; i < pools.length; i++) {
    const p = pools[i];
    if (!p) continue;
    const found = p.find(v => v.id === id);
    if (found) return found;
  }
  return null;
}

/* ============ HOME PAGE ============ */
const HOME_FEATURED_COUNT = 8;
const HOME_UNWATCHED_COUNT = 12;
const HOME_SHORTS_COUNT = 14;
const HOME_REST_COUNT = 60;

function renderHomeSections(ct) {
  if (!allVideos.length) {
    ct.innerHTML = `
      <div class="empty">
        <div class="eico"><svg viewBox="0 0 24 24"><path d="M10 8v8l6-4-6-4zm2-6C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z"/></svg></div>
        <h3>אין סרטונים להצגה</h3>
        <p>${EMPTY_MESSAGES.following}</p>
      </div>`;
    return;
  }

  const large = inlineMode;
  const usedIds = new Set();
  const watchedIds = new Set(watchHistory.map(h => h.id));
  const byDate = allVideos;

  const sections = [];

  const featured = byDate.slice(0, HOME_FEATURED_COUNT);
  featured.forEach(v => usedIds.add(v.id));
  if (featured.length) sections.push({ id: 'shelf-featured', title: 'מומלץ', vids: featured, cls: 'vgrid' });

  const unwatched = byDate
    .filter(v => !usedIds.has(v.id) && !watchedIds.has(v.id) && !v.isShort)
    .slice(0, HOME_UNWATCHED_COUNT);
  unwatched.forEach(v => usedIds.add(v.id));
  if (unwatched.length) sections.push({ id: 'shelf-unwatched', title: 'לא נצפו', vids: unwatched, cls: 'vgrid' });

  const shorts = byDate.filter(v => v.isShort && !usedIds.has(v.id)).slice(0, HOME_SHORTS_COUNT);
  shorts.forEach(v => usedIds.add(v.id));
  if (shorts.length) sections.push({ id: 'shelf-shorts', title: 'שורטס', vids: shorts, cls: 'vgrid shorts-grid' });

  const rest = byDate.filter(v => !usedIds.has(v.id)).slice(0, HOME_REST_COUNT);
  if (rest.length) sections.push({ id: null, title: 'מהערוצים שלך', vids: rest, cls: 'vgrid' + (large ? ' vgrid-large' : '') });

  if (!sections.length) {
    ct.innerHTML = `
      <div class="empty">
        <div class="eico"><svg viewBox="0 0 24 24"><path d="M10 8v8l6-4-6-4zm2-6C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z"/></svg></div>
        <h3>אין סרטונים להצגה</h3>
        <p>${EMPTY_MESSAGES.following}</p>
      </div>`;
    return;
  }

  const prevIcon = `<svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>`;
  const nextIcon = `<svg viewBox="0 0 24 24"><path d="M8.59 16.59L10 18l6-6-6-6-1.41 1.41L13.17 12z"/></svg>`;

  ct.innerHTML = sections.map(s => {
    const gridHtml = `<div class="${s.cls}${s.id ? ' shelf-scroll' : ''}"${s.id ? ` id="${s.id}"` : ''}>${s.vids.map(v => videoCardHtml(v)).join('')}</div>`;
    const body = s.id
      ? `<div class="shelf-wrap">
          <button class="shelf-nav" onclick="scrollShelf('${s.id}',1)" title="הבא">${nextIcon}</button>
          ${gridHtml}
          <button class="shelf-nav" onclick="scrollShelf('${s.id}',-1)" title="הקודם">${prevIcon}</button>
        </div>`
      : gridHtml;
    return `
    <div class="home-section">
      <div class="home-section-title">${x(s.title)}</div>
      ${body}
    </div>`;
  }).join('');
}

function scrollShelf(id, dir) {
  const el = document.getElementById(id);
  if (!el) return;
  const amount = Math.max(el.clientWidth * 0.85, 240);
  el.scrollBy({ left: dir * amount, behavior: 'smooth' });
}

function skelCard() {
  return `<div class="vcard skel-card">
    <div class="vthumb-wrap skel"></div>
    <div class="vinfo"><div class="vav skel"></div>
    <div class="vtext"><div class="skel-line skel" style="width:90%"></div><div class="skel-line skel" style="width:60%"></div></div></div>
  </div>`;
}

const SHORT_ICON_SVG = '<svg viewBox="0 0 24 24"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.27 6.27 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.18 8.18 0 004.84 1.55V6.79a4.85 4.85 0 01-1.07-.1z"></path></svg>';
const HEART_ICON_SVG = '<svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"></path></svg>';

function thumbInnerHtml(v) {
  const isNew = isVideoNew(v);
  return `<img src="${x(v.thumb || '')}" loading="lazy" onerror="this.style.opacity=0">
      ${v.isShort ? `<span class="short-flag" title="שורטס">${SHORT_ICON_SVG}</span>` : `<span class="vdur">${fmtDuration(v.seconds)}</span>`}
      ${isNew ? '<span class="new-flag">חדש</span>' : ''}
      <button class="like-btn ${isLiked(v.id) ? 'on' : ''}" data-vid="${x(v.id)}" onclick="event.stopPropagation();toggleLiked('${x(v.id)}')" title="אהבתי">
        ${HEART_ICON_SVG}
      </button>
      <button class="wl-btn ${isInWatchLater(v.id) ? 'on' : ''}" data-vid="${x(v.id)}" onclick="event.stopPropagation();toggleWatchLater('${x(v.id)}')" title="לצפייה מאוחרת">
        <svg viewBox="0 0 24 24"><path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg>
      </button>`;
}

function videoCardHtml(v) {
  let vmetaText;
  if (section === 'watched' && v.watchedAt) vmetaText = 'נצפה ' + timeAgo(v.watchedAt);
  else if (section === 'watchlater' && v.addedAt) vmetaText = 'נוסף ' + timeAgo(v.addedAt);
  else vmetaText = timeAgo(v.publishedAt);

  const clickFn = inlineMode ? `toggleInlinePlay('${x(v.id)}')` : `openPlayer('${x(v.id)}')`;
  return `
  <div class="vcard" data-vid="${x(v.id)}" onclick="${clickFn}">
    <div class="vthumb-wrap" id="thumb-${x(v.id)}">${thumbInnerHtml(v)}</div>
    <div class="vinfo">
      <div class="vav" onclick="event.stopPropagation();openChannelPage('${x(v.channelId)}')" title="${x(v.channelTitle||'')}">${v.channelThumb ? `<img src="${x(v.channelThumb)}">` : x((v.channelTitle||'?').slice(0,2))}</div>
      <div class="vtext">
        <div class="vtitle">${x(v.title)}</div>
        <div class="vch" onclick="event.stopPropagation();openChannelPage('${x(v.channelId)}')">${x(v.channelTitle)}</div>
        <div class="vmeta">${vmetaText}</div>
      </div>
    </div>
  </div>`;
}

function isVideoNew(v) {
  const seenAt = seenMap[v.channelId];
  if (!seenAt) return true;
  return new Date(v.publishedAt) > new Date(seenAt);
}

function fmtDuration(s) {
  s = Math.round(s||0);
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
  if (h) return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  return `${m}:${String(sec).padStart(2,'0')}`;
}

function timeAgo(iso) {
  const d = new Date(iso);
  const diff = (Date.now() - d.getTime()) / 1000;
  let val = diff, names = ['שניות','דקות','שעות','ימים','חודשים','שנים'];
  const table = [60,60,24,30,12];
  let idx = 0;
  for (; idx < table.length; idx++) {
    if (val < table[idx]) break;
    val /= table[idx];
  }
  val = Math.max(1, Math.floor(val));
  return `לפני ${val} ${names[idx]}`;
}

/* ============ LIKED (local) ============ */
function isLiked(id) {
  return likedVideos.some(v => v.id === id);
}

function toggleLiked(id) {
  const idx = likedVideos.findIndex(v => v.id === id);
  if (idx >= 0) {
    likedVideos.splice(idx, 1);
    toast('הוסר מ"אהבתי"');
  } else {
    const v = findVideoById(id);
    if (!v) return;
    const copy = {}; for (const k in v) copy[k] = v[k];
    copy.likedAt = new Date().toISOString();
    likedVideos.unshift(copy);
    toast('נוסף ל"אהבתי"');
  }
  localStorage.setItem(LIKED_KEY, JSON.stringify(likedVideos.slice(0,300)));
  if (section === 'liked' || section === 'recommended') renderContent();
  else updateLikeButtons();
}

function updateLikeButtons() {
  document.querySelectorAll('.like-btn').forEach(btn => {
    const id = btn.getAttribute('data-vid');
    btn.classList.toggle('on', isLiked(id));
  });
}

function clearLiked() {
  likedVideos = [];
  localStorage.removeItem(LIKED_KEY);
  if (section === 'liked' || section === 'recommended') renderContent();
  updateLikeButtons();
  toast('רשימת "אהבתי" נוקתה');
}

/* ============ WATCH LATER (local) ============ */
function isInWatchLater(id) {
  return watchLater.some(v => v.id === id);
}

function toggleWatchLater(id) {
  const idx = watchLater.findIndex(v => v.id === id);
  if (idx >= 0) {
    watchLater.splice(idx, 1);
    toast('הוסר מלצפייה מאוחרת');
  } else {
    const v = findVideoById(id);
    if (!v) return;
    const copy = {}; for (const k in v) copy[k] = v[k];
    copy.addedAt = new Date().toISOString();
    watchLater.unshift(copy);
    toast('נוסף לצפייה מאוחרת');
  }
  localStorage.setItem(WATCH_LATER_KEY, JSON.stringify(watchLater.slice(0,300)));
  if (section === 'watchlater') renderContent();
  else updateWatchLaterButtons();
}

function updateWatchLaterButtons() {
  document.querySelectorAll('.wl-btn').forEach(btn => {
    const id = btn.getAttribute('data-vid');
    btn.classList.toggle('on', isInWatchLater(id));
  });
}

function clearWatchLater() {
  watchLater = [];
  localStorage.removeItem(WATCH_LATER_KEY);
  if (section === 'watchlater') renderContent();
  updateWatchLaterButtons();
  toast('רשימת "לצפייה מאוחרת" נוקתה');
}

/* ============ WATCH HISTORY (local) ============ */
function recordWatch(v) {
  if (!v) return;
  watchHistory = watchHistory.filter(h => h.id !== v.id);
  const copy = {}; for (const k in v) copy[k] = v[k];
  copy.watchedAt = new Date().toISOString();
  watchHistory.unshift(copy);
  watchHistory = watchHistory.slice(0, 200);
  localStorage.setItem(WATCH_HISTORY_KEY, JSON.stringify(watchHistory));
  if (section === 'watched') renderContent();
}

function clearWatchHistory() {
  watchHistory = [];
  localStorage.removeItem(WATCH_HISTORY_KEY);
  if (section === 'watched') renderContent();
  toast('היסטוריית הצפייה נוקתה');
}

/* ============ NOTIFICATIONS ============ */
function updateNotifBadge() {
  const count = getNewVideos().length;
  const b = document.getElementById('notif-badge');
  b.textContent = count > 9 ? '9+' : String(count);
  b.classList.toggle('show', count > 0);
}

function getNewVideos() {
  return allVideos.filter(isVideoNew).slice(0, 30);
}

function renderNotifPanel() {
  const list = document.getElementById('notif-list');
  const items = getNewVideos();
  if (!items.length) {
    list.innerHTML = `<div class="np-empty">אין התראות חדשות כרגע.</div>`;
    return;
  }
  list.innerHTML = items.map(v => `
    <div class="np-item" onclick="openFromNotif('${x(v.id)}', '${x(v.channelId)}')">
      <img class="np-thumb" src="${x(v.thumb||'')}" loading="lazy">
      <div>
        <div class="np-title">${x(v.title)}</div>
        <div class="np-ch">${x(v.channelTitle)} · ${timeAgo(v.publishedAt)}</div>
      </div>
    </div>`).join('');
}

function openFromNotif(id, channelId) {
  markChannelSeen(channelId);
  toggleNotifPanel(false);
  openPlayer(id);
}

function markChannelSeen(channelId) {
  seenMap[channelId] = new Date().toISOString();
  localStorage.setItem(SEEN_KEY, JSON.stringify(seenMap));
  updateNotifBadge();
  renderChannels();
}

function markAllSeen() {
  const now = new Date().toISOString();
  channels.forEach(c => { seenMap[c.id] = now; });
  allVideos.forEach(v => { if (!seenMap[v.channelId]) seenMap[v.channelId] = now; });
  localStorage.setItem(SEEN_KEY, JSON.stringify(seenMap));
  updateNotifBadge();
  renderChannels();
  renderNotifPanel();
  renderContent();
  toast('כל ההתראות סומנו כנקראו');
}

function toggleNotifPanel(force) {
  const p = document.getElementById('notif-panel');
  const open = typeof force === 'boolean' ? force : !p.classList.contains('open');
  p.classList.toggle('open', open);
  if (open) renderNotifPanel();
}

/* ============ PLAYER MODAL ============ */
function openPlayer(id) {
  const v = findVideoById(id);
  recordWatch(v);
  const isShort = v && v.isShort;
  const wrap = document.getElementById('pm-frame-wrap');
  wrap.className = 'pm-frame-wrap' + (isShort ? ' short-mode' : '');
  document.getElementById('pm-iframe-host').innerHTML =
    `<iframe src="https://www.youtube.com/embed/${encodeURIComponent(id)}?autoplay=1" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>`;
  document.getElementById('pm-title').textContent = (v && v.title) || '';
  document.getElementById('pm-ch').textContent = (v && v.channelTitle) || '';
  document.getElementById('player-modal').classList.add('open');
}
function closePlayer() {
  document.getElementById('player-modal').classList.remove('open');
  document.getElementById('pm-iframe-host').innerHTML = '';
}

/* ============ INLINE (IN-PAGE) PLAYBACK ============ */
function toggleInlineMode() {
  inlineMode = !inlineMode;
  localStorage.setItem(INLINE_MODE_KEY, inlineMode ? '1' : '0');
  updateInlineToggleUI();
  activeInlineId = null;
  renderContent();
}

function updateInlineToggleUI() {
  const btn = document.getElementById('inline-mode-toggle');
  if (!btn) return;
  btn.textContent = inlineMode ? 'מופעל' : 'כבוי';
  btn.classList.toggle('on', inlineMode);
}

function toggleInlinePlay(id) {
  if (activeInlineId === id) {
    closeInlinePlay(id);
    activeInlineId = null;
    return;
  }
  if (activeInlineId) closeInlinePlay(activeInlineId);
  activeInlineId = id;
  const v = findVideoById(id);
  recordWatch(v);
  const wrap = document.getElementById('thumb-' + id);
  if (!wrap) return;
  wrap.innerHTML = `<iframe src="https://www.youtube.com/embed/${encodeURIComponent(id)}?autoplay=1" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen style="position:absolute;inset:0;width:100%;height:100%;border:none;"></iframe>`;
}

function closeInlinePlay(id) {
  const v = findVideoById(id);
  const wrap = document.getElementById('thumb-' + id);
  if (!wrap || !v) return;
  wrap.innerHTML = thumbInnerHtml(v);
}

/* ============ SETTINGS ============ */
function toggleSettings(force) {
  const m = document.getElementById('settings-modal');
  const open = typeof force === 'boolean' ? force : !m.classList.contains('open');
  m.classList.toggle('open', open);
}

function clearSeenMarks() {
  seenMap = {};
  localStorage.removeItem(SEEN_KEY);
  updateNotifBadge();
  renderChannels();
  renderContent();
  toast('סימוני "נצפה" נוקו');
}

function hardReload() {
  location.reload();
}

/* ============ UI BINDINGS ============ */
function bindUI() {
  document.getElementById('sidebar-toggle').onclick = () => {
    const sb = document.getElementById('sidebar');
    if (window.innerWidth <= 760) {
      sb.classList.toggle('mobopen');
      return;
    }
    const col = sb.classList.toggle('col');
    document.getElementById('main').classList.toggle('col', col);
    localStorage.setItem(SIDEBAR_KEY, col ? '1' : '0');
  };

  document.getElementById('theme-toggle').onclick = () => {
    const isDark = document.body.classList.contains('dark');
    document.body.className = isDark ? 'light' : 'dark';
    localStorage.setItem(THEME_KEY, document.body.className);
  };

  document.getElementById('bell-btn').onclick = (e) => {
    e.stopPropagation();
    toggleNotifPanel();
    toggleUserMenu(false);
  };

  document.addEventListener('click', (e) => {
    if (!e.target.closest('#notif-panel') && !e.target.closest('#bell-btn')) toggleNotifPanel(false);
    if (!e.target.closest('#user-menu') && !e.target.closest('#auth-area')) toggleUserMenu(false);
    if (!e.target.closest('#sidebar') && !e.target.closest('#sidebar-toggle') && window.innerWidth <= 760) {
      document.getElementById('sidebar').classList.remove('mobopen');
    }
  });

  document.getElementById('player-modal').addEventListener('click', (e) => {
    if (e.target.id === 'player-modal') closePlayer();
  });

  document.getElementById('settings-modal').addEventListener('click', (e) => {
    if (e.target.id === 'settings-modal') toggleSettings(false);
  });

  setInterval(() => {
    loadEverything(false);
  }, 5 * 60 * 1000);
}

function setRefreshSpin(on) {
  document.getElementById('refresh-btn').classList.toggle('spin', !!on);
}

/* ============ HELPERS ============ */
function x(s='') { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
let _t;
function toast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); clearTimeout(_t); _t = setTimeout(()=>t.classList.remove('show'), 2600); }
</script>
